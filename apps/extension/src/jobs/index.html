<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI / LLM Job Listings — AutoApply</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>🤖 AI & LLM Engineering Jobs</h1>
    <div class="header-controls">
      <select id="source-filter">
        <option value="all">All Sources</option>
      </select>
      <input type="text" id="search-input" placeholder="Search jobs, companies, skills...">
      <button id="refresh-btn">🔄 Refresh</button>
    </div>
  </header>
  <main>
    <div id="stats"></div>
    <div id="job-listings-container">
      <div id="status"><span class="loading-spinner"></span> Loading job listings...</div>
    </div>
  </main>
  <script type="module" src="job_listings.js"></script>
</body>
</html>
